<body>

<div id="msg">Te pienso más de lo que debería 💖</div>

<button id="btn">¿Quieres saber por qué?</button>

<canvas id="c"></canvas>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div id="finalText">Porque desde que te vi… todo cambió 💖</div>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000; /* 🖤 negro total */
  font-family: Arial, sans-serif;
}

/* 🖤 CANVAS FULL NEGRO */
canvas{
  position:absolute;
  top:0;
  left:0;
}

/* 💖 TEXTO PERFECTAMENTE CENTRADO */
#msg{
  position:absolute;
  width:100%;
  text-align:center;
  top:50%;
  transform:translateY(-120%);
  color:white;
  font-size:28px;
  font-weight:bold;
  text-shadow:0 0 20px #ff4da6;
}

/* 💖 BOTÓN CENTRADO REAL */
#btn{
  position:absolute;
  left:50%;
  top:55%;
  transform:translateX(-50%);
  padding:12px 20px;
  font-size:18px;
  border:none;
  border-radius:20px;
  background:#ff4da6;
  color:white;
  cursor:pointer;
  box-shadow:0 0 20px #ff4da6;
}

/* 💖 TEXTO FINAL CENTRADO PERFECTO */
#finalText{
  position:absolute;
  width:100%;
  text-align:center;
  top:50%;
  transform:translateY(120%);
  color:white;
  font-size:22px;
  text-shadow:0 0 15px #ff4da6;
  display:none;
}
</style>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W,H;

function resize(){
  W = innerWidth;
  H = innerHeight;
  canvas.width = W;
  canvas.height = H;
}
resize();
addEventListener("resize", resize);

// 💖 imagen
const img = new Image();
img.src = "foto2.jpg";

// 💖 estado
let step = 1;

// UI
const btn = document.getElementById("btn");
const msg = document.getElementById("msg");
const finalText = document.getElementById("finalText");
const music = document.querySelector("audio");

btn.onclick = () => {
  music.play();
  step = 2;

  btn.style.display = "none";
  msg.style.display = "none";
  finalText.style.display = "block";
};

// 💖 corazón
function heart(t){
  return {
    x:16*Math.pow(Math.sin(t),3),
    y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
  };
}

function draw(){
  requestAnimationFrame(draw);

  // 🖤 fondo negro real (OBLIGATORIO para consistencia)
  ctx.fillStyle = "#000";
  ctx.fillRect(0,0,W,H);

  const cx = W/2;
  const cy = H/2;
  const time = performance.now()*0.001;

  const scale = Math.min(W,H)/28;

  // 💖 ESCENA 1
  if(step === 1){

    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.font="bold 14px Arial";

    for(let i=0;i<160;i++){
      const t = (i/160)*Math.PI*2 + time*0.3;
      const p = heart(t);

      const x = cx + p.x*scale;
      const y = cy + p.y*scale;

      ctx.save();
      ctx.translate(x,y);

      ctx.fillStyle="#ffb6d9";
      ctx.shadowBlur=15;
      ctx.shadowColor="#ff4da6";

      ctx.fillText("I love you 💖",0,0);

      ctx.restore();
    }
  }

  // 💖 ESCENA 2
  if(step === 2){

    const size = Math.min(W,H)*0.2;

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx,cy,size,0,Math.PI*2);
    ctx.clip();

    ctx.drawImage(img,cx-size,cy-size,size*2,size*2);
    ctx.restore();

    ctx.beginPath();
    ctx.arc(cx,cy,size,0,Math.PI*2);
    ctx.strokeStyle="#ff4da6";
    ctx.shadowBlur=25;
    ctx.shadowColor="#ff4da6";
    ctx.stroke();
  }
}

draw();
</script>

</body>
