<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Para Ti 💖</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family: Arial, sans-serif;
}

/* canvas full cinematic */
canvas{
  position:absolute;
  width:100%;
  height:100%;
}

/* texto inicial */
#msg{
  position:absolute;
  width:100%;
  text-align:center;
  top:38%;
  color:white;
  font-size:6vw;
  text-shadow:0 0 25px #ff4da6;
}

/* botón romántico */
#btn{
  position:absolute;
  left:50%;
  top:58%;
  transform:translateX(-50%);
  padding:14px 22px;
  font-size:4.5vw;
  border:none;
  border-radius:30px;
  background:#ff4da6;
  color:white;
  box-shadow:0 0 25px #ff4da6;
}

/* final text */
#finalText{
  position:absolute;
  width:100%;
  text-align:center;
  bottom:10%;
  color:white;
  font-size:4.5vw;
  display:none;
  text-shadow:0 0 20px #ff4da6;
}
</style>
</head>

<body>

<div id="msg">Te pienso más de lo que debería 💖</div>
<button id="btn">¿Quieres saber por qué?</button>
<div id="finalText">Porque desde que llegaste… todo cambió 💖</div>

<canvas id="c"></canvas>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W,H;

function resize(){
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
}
resize();
addEventListener("resize", resize);

// 💖 imagen central
const img = new Image();
img.src = "foto2.jpg";

// 💖 estado
let step = 1;

// 💖 UI
const btn = document.getElementById("btn");
const msg = document.getElementById("msg");
const finalText = document.getElementById("finalText");
const music = document.getElementById("music");

btn.onclick = () => {
  music.play();
  step = 2;
  msg.style.opacity = 0;
  btn.style.opacity = 0;
  finalText.style.display = "block";
};

// 💖 partículas (aura romántica real)
const particles = Array.from({length:60},()=>({
  x:Math.random()*W,
  y:Math.random()*H,
  r:Math.random()*2+1,
  v:Math.random()*0.5+0.2
}));

function drawParticles(){
  ctx.fillStyle="rgba(255,77,166,0.6)";

  for(let p of particles){
    ctx.beginPath();
    ctx.shadowBlur=10;
    ctx.shadowColor="#ff4da6";
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.y += p.v;
    p.x += Math.sin(p.y*0.01)*0.4;

    if(p.y>H){
      p.y=0;
      p.x=Math.random()*W;
    }
  }
}

// 💖 corazón completo (SIN simplificar)
function heart(t){
  return {
    x:16*Math.pow(Math.sin(t),3),
    y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
  };
}

// 💖 loop cinematográfico fluido
function draw(){
  requestAnimationFrame(draw);

  // 🖤 fondo negro real (aura intacta)
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,W,H);

  const cx = W/2;
  const cy = H/2;
  const time = performance.now()*0.001;

  drawParticles();

  const scale = Math.min(W,H)/24;

  // 🎬 ESCENA 1 (corazón vivo completo)
  if(step === 1){

    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.font="bold 14px Arial";

    for(let i=0;i<180;i++){
      const t = (i/180)*Math.PI*2 + time*0.3;
      const p = heart(t);

      const x = cx + p.x*scale;
      const y = cy + p.y*scale;

      ctx.save();
      ctx.translate(x,y);

      ctx.shadowBlur=15;
      ctx.shadowColor="#ff4da6";
      ctx.fillStyle="#ffb6d9";

      ctx.fillText("I love you 💖",0,0);

      ctx.restore();
    }
  }

  // 🎬 ESCENA 2 (revelación romántica completa)
  if(step === 2){

    const size = Math.min(W,H)*0.2;

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx,cy,size,0,Math.PI*2);
    ctx.clip();

    ctx.drawImage(img, cx-size, cy-size, size*2, size*2);
    ctx.restore();

    // aura glow fuerte (esto recupera el “wow”)
    ctx.beginPath();
    ctx.arc(cx,cy,size,0,Math.PI*2);
    ctx.shadowBlur=40;
    ctx.shadowColor="#ff4da6";
    ctx.strokeStyle="#ff4da6";
    ctx.lineWidth=2;
    ctx.stroke();

    // pulso romántico
    ctx.fillStyle="rgba(255,77,166,0.08)";
    ctx.beginPath();
    ctx.arc(cx,cy,size+20+Math.sin(time*6)*10,0,Math.PI*2);
    ctx.fill();
  }
}

draw();
</script>

</body>
</html>
