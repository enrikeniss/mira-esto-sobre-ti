<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Para Ti 💖</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
  touch-action: manipulation;
  font-family: Arial, sans-serif;
}

canvas{
  display:block;
  width:100vw;
  height:100vh;
}

#msg{
  position:absolute;
  width:100%;
  text-align:center;
  top:35%;
  color:white;
  font-size:6vw;
  text-shadow:0 0 15px #ff4da6;
}

#btn{
  position:absolute;
  left:50%;
  top:58%;
  transform:translateX(-50%);
  padding:12px 20px;
  font-size:4.5vw;
  border:none;
  border-radius:25px;
  background:#ff4da6;
  color:white;
  box-shadow:0 0 15px #ff4da6;
}

#finalText{
  position:absolute;
  width:100%;
  text-align:center;
  bottom:10%;
  color:white;
  font-size:4.5vw;
  display:none;
  text-shadow:0 0 15px #ff4da6;
}
</style>
</head>

<body>

<div id="msg">Te pienso más de lo que debería 💖</div>
<button id="btn">¿Quieres saber por qué?</button>
<div id="finalText">Porque desde que llegaste… todo cambió 💖</div>

<canvas id="c"></canvas>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W,H,DPR;

// 📱 optimización real para móvil
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2); // limita a 2 para evitar lag
  W = window.innerWidth;
  H = window.innerHeight;

  canvas.width = W * DPR;
  canvas.height = H * DPR;

  canvas.style.width = W + "px";
  canvas.style.height = H + "px";

  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize();
window.addEventListener("resize", resize);

// 💖 estado
let step = 1;

// 📷 imagen optimizada
const img = new Image();
img.src = "foto2.jpg";

// ❤️ MENOS partículas = más fluido
const hearts = Array.from({length:35},()=>({
  x:Math.random()*W,
  y:Math.random()*H,
  v:Math.random()*0.6+0.2
}));

// 💖 corazón matemático (ligeramente simplificado)
function heart(t){
  return {
    x:16*Math.pow(Math.sin(t),3),
    y:-(13*Math.cos(t)-5*Math.cos(2*t)-Math.cos(3*t))
  };
}

// 🎯 botón
const btn = document.getElementById("btn");
const msg = document.getElementById("msg");
const finalText = document.getElementById("finalText");
const music = document.getElementById("music");

btn.onclick = () => {
  music.play();
  step = 2;
  msg.style.display="none";
  btn.style.display="none";
  finalText.style.display="block";
};

// ✨ partículas (ULTRA ligeras)
function drawParticles(){
  ctx.fillStyle="rgba(255,77,166,0.6)";

  for(let i=0;i<hearts.length;i++){
    let p = hearts[i];

    ctx.beginPath();
    ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
    ctx.fill();

    p.y += p.v;
    p.x += Math.sin(p.y*0.01)*0.3;

    if(p.y > H){
      p.y = 0;
      p.x = Math.random()*W;
    }
  }
}

// 💖 loop optimizado (requestAnimationFrame limpio)
function draw(){
  requestAnimationFrame(draw);

  // 🖤 fondo fijo (más rápido que clearRect en móviles viejos)
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,W,H);

  const cx = W/2;
  const cy = H/2;
  const time = performance.now()*0.001;

  drawParticles();

  const scale = Math.min(W,H)/25;

  // 💖 ESCENA 1
  if(step === 1){

    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.font = "bold 12px Arial";

    for(let i=0;i<120;i++){ // reducido para fluidez
      const t = (i/120)*Math.PI*2 + time*0.3;
      const p = heart(t);

      const x = cx + p.x*scale;
      const y = cy + p.y*scale;

      ctx.save();
      ctx.translate(x,y);

      ctx.fillStyle="#ffb6d9";
      ctx.shadowBlur=10;
      ctx.shadowColor="#ff4da6";

      ctx.fillText("💖",0,0);

      ctx.restore();
    }
  }

  // 💖 ESCENA 2
  if(step === 2){

    const size = Math.min(W,H)*0.18;

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx,cy,size,0,Math.PI*2);
    ctx.clip();

    ctx.drawImage(img, cx-size, cy-size, size*2, size*2);
    ctx.restore();

    ctx.strokeStyle="#ff4da6";
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(cx,cy,size,0,Math.PI*2);
    ctx.stroke();
  }
}

draw();
</script>

</body>
</html>
