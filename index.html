<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Para Ti 💖</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:Arial;
}

/* canvas */
canvas{
  position:absolute;
  width:100%;
  height:100%;
}

/* texto inicial */
#msg{
  position:absolute;
  width:100%;
  text-align:center;
  top:35%;
  color:white;
  font-size:6vw;
  text-shadow:0 0 20px #ff4da6;
}

/* botón desde inicio */
#btn{
  position:absolute;
  left:50%;
  top:55%;
  transform:translateX(-50%);
  padding:14px 22px;
  font-size:4.5vw;
  border:none;
  border-radius:40px;
  background:#ff4da6;
  color:white;
  box-shadow:0 0 25px #ff4da6;
  animation:beat 1.3s infinite;
}

@keyframes beat{
  0%,100%{transform:translateX(-50%) scale(1);}
  50%{transform:translateX(-50%) scale(1.08);}
}

/* mensaje final */
#finalText{
  position:absolute;
  width:100%;
  text-align:center;
  bottom:10%;
  color:white;
  font-size:4.5vw;
  display:none;
  text-shadow:0 0 15px #ff4da6;
}
</style>
</head>

<body>

<div id="msg">No dejo de pensar en ti 💖</div>
<button id="btn">¿Quieres saber por qué?</button>
<div id="finalText">Porque desde que llegaste… todo cambió 💖</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W,H;

function resize(){
  W = innerWidth;
  H = innerHeight;
  canvas.width = W;
  canvas.height = H;
}
resize();
addEventListener("resize", resize);

// 💖 imagen
const img = new Image();
img.src = "foto2.jpg";

// 💖 estado
let step = 1;

// UI
const btn = document.getElementById("btn");
const msg = document.getElementById("msg");
const finalText = document.getElementById("finalText");
const music = document.getElementById("music");

// 💖 botón click
btn.onclick = () => {

  music.play();

  msg.style.transition="1s";
  msg.style.opacity=0;
  btn.style.transition="1s";
  btn.style.opacity=0;

  setTimeout(()=>{
    msg.style.display="none";
    btn.style.display="none";
    finalText.style.display="block";
    step = 2;
  },1000);
};

// 💖 corazón
function heart(t){
  return {
    x:16*Math.pow(Math.sin(t),3),
    y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
  };
}

// 💖 partículas suaves
const particles = Array.from({length:55},()=>({
  x:Math.random()*W,
  y:Math.random()*H,
  v:Math.random()*0.5+0.2
}));

function drawParticles(){
  ctx.fillStyle="rgba(255,77,166,0.6)";

  for(let p of particles){
    ctx.beginPath();
    ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
    ctx.fill();

    p.y += p.v;
    p.x += Math.sin(p.y*0.01)*0.3;

    if(p.y>H){
      p.y=0;
      p.x=Math.random()*W;
    }
  }
}

// 💖 loop
function draw(){
  requestAnimationFrame(draw);

  ctx.fillStyle="#000";
  ctx.fillRect(0,0,W,H);

  const cx = W/2;
  const cy = H/2;
  const time = performance.now()*0.001;

  drawParticles();

  const scale = Math.min(W,H)/28;

  // 💖 ESCENA 1: corazón vivo desde inicio
  if(step === 1){

    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.font="bold 14px Arial";

    for(let i=0;i<160;i++){
      const t = (i/160)*Math.PI*2 + time*0.3;
      const h = heart(t);

      const x = cx + h.x*scale;
      const y = cy + h.y*scale;

      ctx.save();
      ctx.translate(x,y);

      ctx.fillStyle="#ffb6d9";
      ctx.shadowBlur=15;
      ctx.shadowColor="#ff4da6";

      ctx.fillText("💖",0,0);

      ctx.restore();
    }
  }

  // 💖 ESCENA 2: REVELACIÓN
  if(step === 2){

    const size = Math.min(W,H)*0.2;

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx,cy,size,0,Math.PI*2);
    ctx.clip();

    ctx.drawImage(img,cx-size,cy-size,size*2,size*2);
    ctx.restore();

    ctx.beginPath();
    ctx.arc(cx,cy,size,0,Math.PI*2);
    ctx.strokeStyle="#ff4da6";
    ctx.shadowBlur=35;
    ctx.shadowColor="#ff4da6";
    ctx.stroke();

    ctx.fillStyle="rgba(255,77,166,0.08)";
    ctx.beginPath();
    ctx.arc(cx,cy,size+15+Math.sin(time*6)*10,0,Math.PI*2);
    ctx.fill();
  }
}

draw();
</script>

</body>
</html>
