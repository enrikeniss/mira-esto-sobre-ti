<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Para Ti 💖</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family: Arial, sans-serif;
}

/* CANVAS */
canvas{
  position:absolute;
  width:100%;
  height:100%;
}

/* TEXTO INICIAL */
#msg{
  position:absolute;
  width:100%;
  text-align:center;
  top:35%;
  color:white;
  font-size:6vw;
  text-shadow:0 0 20px #ff4da6;
}

/* BOTÓN (AHORA SI SIEMPRE VISIBLE) */
#btn{
  position:absolute;
  left:50%;
  top:55%;
  transform:translateX(-50%);
  padding:12px 18px;
  font-size:4.5vw;
  border:none;
  border-radius:30px;
  background:#ff4da6;
  color:white;
  box-shadow:0 0 20px #ff4da6;
  cursor:pointer;
}

/* TEXTO FINAL */
#finalText{
  position:absolute;
  width:100%;
  text-align:center;
  bottom:10%;
  color:white;
  font-size:4.5vw;
  display:none;
  text-shadow:0 0 15px #ff4da6;
}
</style>
</head>

<body>

<div id="msg">Te pienso más de lo que debería 💖</div>
<button id="btn">¿Quieres saber por qué?</button>
<div id="finalText">Porque desde que llegaste… todo cambió 💖</div>

<canvas id="c"></canvas>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W,H;

function resize(){
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
}
resize();
addEventListener("resize", resize);

// 💖 imagen
const img = new Image();
img.src = "foto2.jpg";

// 💖 estado
let step = 1;

// 💖 UI
const btn = document.getElementById("btn");
const msg = document.getElementById("msg");
const finalText = document.getElementById("finalText");
const music = document.getElementById("music");

btn.onclick = () => {
  music.play();
  step = 2;
  msg.style.display = "none";
  btn.style.display = "none";
  finalText.style.display = "block";
};

// 💖 partículas suaves (ligeras)
const particles = Array.from({length:45},()=>({
  x:Math.random()*W,
  y:Math.random()*H,
  v:Math.random()*0.4+0.2,
  r:Math.random()*1.8+0.8
}));

function drawParticles(){
  ctx.fillStyle="rgba(255,77,166,0.6)";

  for(let p of particles){
    ctx.beginPath();
    ctx.shadowBlur=10;
    ctx.shadowColor="#ff4da6";
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.y += p.v;
    p.x += Math.sin(p.y*0.01)*0.3;

    if(p.y > H){
      p.y = 0;
      p.x = Math.random()*W;
    }
  }
}

// 💖 corazón (MISMO pero más pequeño en escala)
function heart(t){
  return {
    x:16*Math.pow(Math.sin(t),3),
    y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
  };
}

function draw(){
  requestAnimationFrame(draw);

  // 🖤 fondo fijo
  ctx.fillStyle="#000";
  ctx.fillRect(0,0,W,H);

  const cx = W/2;
  const cy = H/2;
  const time = performance.now()*0.001;

  drawParticles();

  // 💡 CORAZÓN MÁS PEQUEÑO (CLAVE PARA MÓVIL)
  const scale = Math.min(W,H)/35;

  // 🎬 ESCENA 1
  if(step === 1){

    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.font="bold 12px Arial";

    for(let i=0;i<140;i++){
      const t = (i/140)*Math.PI*2 + time*0.3;
      const p = heart(t);

      const x = cx + p.x*scale;
      const y = cy + p.y*scale;

      ctx.save();
      ctx.translate(x,y);

      ctx.shadowBlur=12;
      ctx.shadowColor="#ff4da6";
      ctx.fillStyle="#ffb6d9";

      ctx.fillText("💖",0,0);

      ctx.restore();
    }
  }

  // 🎬 ESCENA 2
  if(step === 2){

    const size = Math.min(W,H)*0.18; // más pequeño también

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx,cy,size,0,Math.PI*2);
    ctx.clip();

    ctx.drawImage(img, cx-size, cy-size, size*2, size*2);
    ctx.restore();

    ctx.beginPath();
    ctx.arc(cx,cy,size,0,Math.PI*2);
    ctx.shadowBlur=30;
    ctx.shadowColor="#ff4da6";
    ctx.strokeStyle="#ff4da6";
    ctx.stroke();
  }
}

draw();
</script>

</body>
</html>
