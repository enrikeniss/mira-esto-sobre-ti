<body>

<div id="msg">Te pienso más de lo que debería 💖</div>

<button id="btn">¿Quieres saber por qué?</button>

<canvas id="c"></canvas>

<audio id="music" autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<style>
#btn{
  position:absolute;
  left:50%;
  top:60%;
  transform:translateX(-50%);
  padding:12px 20px;
  font-size:18px;
  border:none;
  border-radius:20px;
  background:#ff4da6;
  color:white;
  cursor:pointer;
  box-shadow:0 0 20px #ff4da6;
  transition:0.3s;
}

#btn:hover{
  transform:translateX(-50%) scale(1.05);
}

#msg{
  position:absolute;
  width:100%;
  text-align:center;
  top:40%;
  color:white;
  font-size:28px;
  font-weight:bold;
  text-shadow:0 0 20px #ff4da6;
}

#finalText{
  position:absolute;
  width:100%;
  text-align:center;
  top:75%;
  color:white;
  font-size:22px;
  text-shadow:0 0 15px #ff4da6;
  display:none;
}
</style>

<div id="finalText">Porque desde que te vi… todo cambió 💖</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

// 💖 estado
let step = 1;

// ❤️ imagen central
const img = new Image();
img.src = "foto2.jpg";

// ✨ botón
const btn = document.getElementById("btn");
const msg = document.getElementById("msg");
const finalText = document.getElementById("finalText");

btn.onclick = () => {
  step = 2;
  btn.style.display = "none";
  msg.style.display = "none";
  finalText.style.display = "block";
};

// 💖 corazón
function heart(t){
  return {
    x:16*Math.pow(Math.sin(t),3),
    y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
  };
}

function draw(){
  requestAnimationFrame(draw);

  const time = Date.now()*0.001;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const cx = canvas.width/2;
  const cy = canvas.height/2;

  const scale = 20 + Math.sin(time*2)*2;

  // 💖 FASE 1: solo animación
  if(step === 1){

    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.font="bold 16px Arial";

    for(let i=0;i<200;i++){
      const t = (i/200)*Math.PI*2 + time*0.3;
      const p = heart(t);

      const x = cx + p.x*scale;
      const y = cy + p.y*scale;

      ctx.save();
      ctx.translate(x,y);
      ctx.rotate(t);

      ctx.fillStyle="#ffb6d9";
      ctx.shadowBlur=15;
      ctx.shadowColor="#ff4da6";
      ctx.fillText("I love you 💖",0,0);

      ctx.restore();
    }
  }

  // 💖 FASE 2: aparece foto en el corazón
  if(step === 2){

    const size = 140;

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx,cy,size,0,Math.PI*2);
    ctx.clip();

    ctx.drawImage(img, cx-size, cy-size, size*2, size*2);
    ctx.restore();

    // borde glow
    ctx.beginPath();
    ctx.arc(cx,cy,size,0,Math.PI*2);
    ctx.strokeStyle="#ff4da6";
    ctx.shadowBlur=20;
    ctx.shadowColor="#ff4da6";
    ctx.stroke();
  }
}

draw();
</script>

</body>
