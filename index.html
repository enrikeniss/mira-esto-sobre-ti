<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Para Ti 💖</title>

<style>
html,body{
  margin:0;
  height:100%;
  overflow:hidden;
  background: radial-gradient(circle at center,#1a001f,#000);
  font-family: Arial, sans-serif;
}

/* canvas */
canvas{
  display:block;
}

/* escena inicial */
#msg{
  position:absolute;
  width:100%;
  text-align:center;
  top:38%;
  color:white;
  font-size:30px;
  font-weight:bold;
  text-shadow:0 0 25px #ff4da6;
}

/* botón */
#btn{
  position:absolute;
  left:50%;
  top:58%;
  transform:translateX(-50%);
  padding:14px 24px;
  font-size:18px;
  border:none;
  border-radius:25px;
  background:#ff4da6;
  color:white;
  cursor:pointer;
  box-shadow:0 0 25px #ff4da6;
  transition:0.3s;
}

#btn:hover{
  transform:translateX(-50%) scale(1.1);
}

/* texto final */
#finalText{
  position:absolute;
  width:100%;
  text-align:center;
  top:78%;
  color:white;
  font-size:22px;
  text-shadow:0 0 20px #ff4da6;
  display:none;
}

/* overlay cinematic */
#fade{
  position:absolute;
  width:100%;
  height:100%;
  background:black;
  opacity:0;
  pointer-events:none;
}
</style>
</head>

<body>

<div id="msg">Te pienso más de lo que debería 💖</div>
<button id="btn">¿Quieres saber por qué?</button>
<div id="finalText">Porque me gustas tanto y porque aún no le das de comer a chiquis, te encargo Guapa :3 ❤️</div>
<div id="fade"></div>

<canvas id="c"></canvas>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

// 💖 imágenes
const img = new Image();
img.src = "foto2.jpg";

// 💖 estado
let step = 1;

// 💖 elementos UI
const btn = document.getElementById("btn");
const msg = document.getElementById("msg");
const finalText = document.getElementById("finalText");
const fade = document.getElementById("fade");
const music = document.getElementById("music");

// ❤️ partículas (lluvia de corazones)
const hearts = [];
for(let i=0;i<80;i++){
  hearts.push({
    x:Math.random()*innerWidth,
    y:Math.random()*innerHeight,
    s:Math.random()*2+1,
    v:Math.random()*1+0.5
  });
}

// 💖 corazón matemático
function heart(t){
  return {
    x:16*Math.pow(Math.sin(t),3),
    y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
  };
}

// ✨ click principal
btn.onclick = () => {

  // música
  music.play();

  // fade cinematográfico
  fade.style.transition = "1.5s";
  fade.style.opacity = "0.6";

  setTimeout(()=>{
    step = 2;
    msg.style.display="none";
    btn.style.display="none";
    finalText.style.display="block";

    fade.style.opacity = "0";
  },1200);
};

// 💖 lluvia de corazones
function drawHearts(){
  ctx.fillStyle="rgba(255,77,166,0.7)";
  for(let h of hearts){
    ctx.beginPath();
    ctx.arc(h.x,h.y,h.s,0,Math.PI*2);
    ctx.fill();

    h.y += h.v;
    h.x += Math.sin(h.y*0.01);

    if(h.y>innerHeight){
      h.y=0;
      h.x=Math.random()*innerWidth;
    }
  }
}

// 💖 animación principal
function draw(){
  requestAnimationFrame(draw);

  const time = Date.now()*0.001;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const cx = canvas.width/2;
  const cy = canvas.height/2;

  drawHearts();

  const scale = 22 + Math.sin(time*2)*2;

  // 🎬 ESCENA 1: texto flotante en corazón
  if(step === 1){

    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.font="bold 16px Arial";

    for(let i=0;i<220;i++){
      const t = (i/220)*Math.PI*2 + time*0.3;
      const p = heart(t);

      const x = cx + p.x*scale;
      const y = cy + p.y*scale;

      ctx.save();
      ctx.translate(x,y);
      ctx.rotate(t);

      ctx.fillStyle="#ffb6d9";
      ctx.shadowBlur=18;
      ctx.shadowColor="#ff4da6";
      ctx.fillText("I love you 💖",0,0);

      ctx.restore();
    }
  }

  // 🎬 ESCENA 2: REVELACIÓN CINEMATICA
  if(step === 2){

    // zoom suave
    const size = 160 + Math.sin(time*2)*5;

    ctx.save();
    ctx.beginPath();
    ctx.arc(cx,cy,size,0,Math.PI*2);
    ctx.clip();

    ctx.drawImage(img, cx-size, cy-size, size*2, size*2);
    ctx.restore();

    // borde glow
    ctx.beginPath();
    ctx.arc(cx,cy,size,0,Math.PI*2);
    ctx.strokeStyle="#ff4da6";
    ctx.shadowBlur=30;
    ctx.shadowColor="#ff4da6";
    ctx.stroke();

    // latido del corazón (overlay suave)
    ctx.fillStyle="rgba(255,77,166,0.08)";
    ctx.beginPath();
    ctx.arc(cx,cy,size+20+Math.sin(time*6)*10,0,Math.PI*2);
    ctx.fill();
  }
}

draw();
</script>

</body>
</html>
